```html
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NL Tier Testing</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    text-align:center;
    padding:20px;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    color:#55ff55;
    font-size:42px;
    text-shadow:2px 2px black;
}

input,select,button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#55ff55;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.player{
    background:#1e1e1e;
    padding:15px;
    margin:10px;
    border-radius:12px;
    border-left:8px solid #55ff55;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.rank{
    font-size:24px;
    font-weight:bold;
}

.deleteBtn{
    background:red;
    color:white;
    margin-top:10px;
}

.adminBox{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.filterButtons{
    margin-bottom:20px;
}

.filterButtons button{
    background:#333;
    color:white;
}

.filterButtons button:hover{
    background:#55ff55;
    color:black;
}

</style>
</head>
<body>

<div class="container">

<h1>NL Tier Testing</h1>

<div class="adminBox">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Admin wachtwoord">
<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none;">

<h2>Tier toevoegen</h2>

<input type="text" id="playerName" placeholder="Spelernaam">

<select id="gamemode">
<option>Spear</option>
<option>Mace</option>
<option>Sword</option>
<option>UHC</option>
<option>Speed</option>
<option>Axe</option>
<option>Vanilla</option>
</select>

<select id="tier">
<option>HT1</option>
<option>LT1</option>
<option>HT2</option>
<option>LT2</option>
<option>HT3</option>
<option>LT3</option>
<option>HT4</option>
<option>LT4</option>
<option>HT5</option>
<option>LT5</option>
</select>

<button onclick="addPlayer()">Opslaan</button>

</div>

</div>

<h2>Gamemode Filter</h2>

<div class="filterButtons">

<button onclick="filterMode('ALL')">All</button>
<button onclick="filterMode('Spear')">Spear</button>
<button onclick="filterMode('Mace')">Mace</button>
<button onclick="filterMode('Sword')">Sword</button>
<button onclick="filterMode('UHC')">UHC</button>
<button onclick="filterMode('Speed')">Speed</button>
<button onclick="filterMode('Axe')">Axe</button>
<button onclick="filterMode('Vanilla')">Vanilla</button>

</div>

<h2>Leaderboard</h2>

<div id="leaderboard"></div>

</div>

<script>

const ADMIN_PASSWORD = "1234";

const tierRank = {
    "HT1":1,
    "LT1":2,
    "HT2":3,
    "LT2":4,
    "HT3":5,
    "LT3":6,
    "HT4":7,
    "LT4":8,
    "HT5":9,
    "LT5":10
};

let isAdmin = false;

let currentFilter = "ALL";

function login(){

    const pass = document.getElementById("password").value;

    if(pass === ADMIN_PASSWORD){

        isAdmin = true;

        document.getElementById("adminPanel").style.display = "block";

        alert("Ingelogd!");

        renderLeaderboard();

    } else {

        alert("Verkeerd wachtwoord");

    }
}

function filterMode(mode){

    currentFilter = mode;

    renderLeaderboard();
}

function addPlayer(){

    const player = document.getElementById("playerName").value;
    const gamemode = document.getElementById("gamemode").value;
    const tier = document.getElementById("tier").value;

    if(player === "") return;

    let data = JSON.parse(localStorage.getItem("tiers") || "[]");

    data.push({
        player,
        gamemode,
        tier
    });

    localStorage.setItem("tiers", JSON.stringify(data));

    document.getElementById("playerName").value = "";

    renderLeaderboard();
}

function deletePlayer(index){

    let data = JSON.parse(localStorage.getItem("tiers") || "[]");

    data.splice(index,1);

    localStorage.setItem("tiers", JSON.stringify(data));

    renderLeaderboard();
}

function renderLeaderboard(){

    const board = document.getElementById("leaderboard");

    let data = JSON.parse(localStorage.getItem("tiers") || "[]");

    data.sort((a,b) => tierRank[a.tier] - tierRank[b.tier]);

    board.innerHTML = "";

    data.forEach((entry,index) => {

        if(currentFilter !== "ALL" && entry.gamemode !== currentFilter){
            return;
        }

        board.innerHTML += `
            <div class="player">

                <div class="rank">${entry.player}</div>

                <div>
                    ${entry.gamemode} • ${entry.tier}
                </div>

                ${
                    isAdmin
                    ?
                    `<button class="deleteBtn" onclick="deletePlayer(${index})">Delete</button>`
                    :
                    ""
                }

            </div>
        `;
    });
}

renderLeaderboard();

</script>

</body>
</html>
```
