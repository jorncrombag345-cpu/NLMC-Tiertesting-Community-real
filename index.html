<br><br>

<button onclick="bereken()">Bereken</button>

<div id="result"></div>

</div>

<script>
function bereken(){
    let totaal = 0;

    document.querySelectorAll(".tier").forEach(select=>{
        totaal += Number(select.value);
    });

    let rank = "";

    if(totaal >= 65){
        rank = "🏆 Elite";
    } else if(totaal >= 50){
        rank = "💎 Diamond";
    } else if(totaal >= 35){
        rank = "🥇 Gold";
    } else if(totaal >= 20){
        rank = "🥈 Silver";
    } else {
        rank = "🥉 Bronze";
    }

    document.getElementById("result").innerHTML =
        Totale Score: ${totaal}<br>Rank: ${rank};
}
</script>
