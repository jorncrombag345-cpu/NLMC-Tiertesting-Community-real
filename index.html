<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NL Tiers</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#070b14;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* BACKGROUND */

.bg1,.bg2{
position:fixed;
width:700px;
height:700px;
border-radius:50%;
filter:blur(200px);
z-index:-1;
}

.bg1{
background:#00ff88;
top:-300px;
left:-300px;
opacity:0.08;
}

.bg2{
background:#7b5cff;
bottom:-300px;
right:-300px;
opacity:0.08;
}

/* NAV */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 50px;
}

.logo{
font-size:46px;
font-weight:900;
}

.logo span{
color:#00ff88;
}

.navRight{
display:flex;
gap:12px;
}

.navRight input{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:14px;
border-radius:16px;
color:white;
outline:none;
}

.navRight button{
border:none;
background:linear-gradient(135deg,#00ff88,#00d0ff);
padding:14px 22px;
border-radius:16px;
font-weight:800;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
margin-top:20px;
}

.hero h1{
font-size:110px;
font-weight:900;
background:linear-gradient(90deg,white,#9ee7ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:12px;
font-size:20px;
color:#8d96aa;
}

/* SEARCH */

.searchBox{
max-width:700px;
margin:40px auto;
padding:0 20px;
}

.searchBox input{
width:100%;
padding:22px;
border-radius:24px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:white;
font-size:18px;
outline:none;
}

/* FILTERS */

.filters{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
padding:0 20px;
margin-bottom:40px;
}

.filters button{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
color:white;
padding:12px 18px;
border-radius:16px;
cursor:pointer;
font-weight:700;
transition:0.25s;
}

.filters button:hover{
background:#00ff88;
color:black;
}

/* ADMIN PANEL */

.adminPanel{
display:none;
width:95%;
max-width:1300px;
margin:auto;
margin-bottom:35px;
padding:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:30px;
}

.adminGrid{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

.adminGrid input,
.adminGrid select{
background:#10151f;
border:1px solid rgba(255,255,255,0.08);
color:white;
padding:14px;
border-radius:16px;
}

.adminGrid button{
border:none;
background:#00ff88;
padding:14px 22px;
border-radius:16px;
font-weight:800;
cursor:pointer;
}

/* LEADERBOARD */

#leaderboard{
width:100%;
max-width:1450px;
margin:auto;
padding:0 20px 50px;
display:flex;
flex-direction:column;
gap:22px;
}

/* PLAYER CARD */

.player{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:26px;
border-radius:34px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:0.25s;
}

.player:hover{
transform:translateY(-5px) scale(1.01);
}

.left{
display:flex;
align-items:center;
gap:20px;
}

.rank{
width:75px;
height:75px;
border-radius:24px;
background:linear-gradient(135deg,#ffd54f,#ff9800);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:900;
color:black;
}

.avatar{
width:85px;
height:85px;
border-radius:28px;
background:linear-gradient(135deg,#00ff88,#00d0ff);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:900;
color:black;
}

.playerInfo h2{
font-size:36px;
font-weight:900;
}

.playerInfo p{
margin-top:6px;
color:#8f98ab;
}

.points{
text-align:right;
}

.points h3{
font-size:46px;
font-weight:900;
color:#00ff88;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
backdrop-filter:blur(10px);
z-index:999;
}

.modalContent{
width:92%;
max-width:700px;
background:linear-gradient(145deg,#111827,#0b0f18);
padding:40px;
border-radius:36px;
border:1px solid rgba(255,255,255,0.08);
}

.modalTop{
text-align:center;
margin-bottom:30px;
}

.bigAvatar{
width:130px;
height:130px;
border-radius:36px;
background:linear-gradient(135deg,#00ff88,#00d0ff);
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:54px;
font-weight:900;
color:black;
margin-bottom:18px;
}

.modalName{
font-size:56px;
font-weight:900;
}

.totalPoints{
margin-top:10px;
font-size:22px;
color:#00ff88;
}

.tierGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:18px;
}

.tierCard{
background:rgba(255,255,255,0.04);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.08);
text-align:center;
}

.tierMode{
color:#8f98ab;
}

.tierRank{
margin-top:8px;
font-size:30px;
font-weight:900;
color:#00ff88;
}

.tierPoints{
margin-top:8px;
color:#ffc107;
}

.closeBtn{
width:100%;
margin-top:30px;
border:none;
background:linear-gradient(135deg,#00ff88,#00d0ff);
padding:16px;
border-radius:18px;
font-weight:900;
cursor:pointer;
}

/* MOBILE */

@media(max-width:850px){

.hero h1{
font-size:65px;
}

.player{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.points{
text-align:left;
}

.nav{
flex-direction:column;
gap:20px;
}

}

</style>

</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="nav">

<div class="logo">
NL<span>TIERS</span>
</div>

<div class="navRight">

<input
type="password"
id="password"
placeholder="Admin code"
>

<button onclick="login()">
Login
</button>

</div>

</div>

<div class="hero">

<h1>Leaderboard</h1>

<p>Best Minecraft Competitive Players</p>

</div>

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search player..."
onkeyup="loadPlayers()"
>

</div>

<!-- ADMIN -->

<div class="adminPanel" id="adminPanel">

<div class="adminGrid">

<input
type="text"
id="playerName"
placeholder="Player Name"
>

<select id="gamemode">

<option>Mace</option>
<option>Sword</option>
<option>Spear</option>
<option>UHC</option>
<option>Axe</option>
<option>Speed</option>
<option>Vanilla</option>
<option>DIA SMP</option>
<option>Cart</option>
<option>Creeper</option>

</select>

<select id="tier">

<option>HT1</option>
<option>LT1</option>
<option>HT2</option>
<option>LT2</option>
<option>HT3</option>
<option>LT3</option>
<option>HT4</option>
<option>LT4</option>
<option>HT5</option>
<option>LT5</option>

</select>

<button onclick="addPlayer()">
Add Tier
</button>

</div>

</div>

<!-- FILTERS -->

<div class="filters">

<button onclick="filterMode('ALL')">ALL</button>
<button onclick="filterMode('Mace')">MACE</button>
<button onclick="filterMode('Sword')">SWORD</button>
<button onclick="filterMode('Spear')">SPEAR</button>
<button onclick="filterMode('UHC')">UHC</button>
<button onclick="filterMode('Axe')">AXE</button>
<button onclick="filterMode('Speed')">SPEED</button>
<button onclick="filterMode('Vanilla')">VANILLA</button>
<button onclick="filterMode('DIA SMP')">DIA SMP</button>
<button onclick="filterMode('Cart')">CART</button>
<button onclick="filterMode('Creeper')">CREEPER</button>

</div>

<!-- BOARD -->

<div id="leaderboard"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalContent">

<div class="modalTop">

<div class="bigAvatar" id="bigAvatar">
A
</div>

<div class="modalName" id="modalName">
Player
</div>

<div class="totalPoints" id="totalPoints">
0 Points
</div>

</div>

<div class="tierGrid" id="modalStats"></div>

<button class="closeBtn" onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

const SUPABASE_URL =
"https://mgtwbthpqinyxrcnglwt.supabase.co";

const SUPABASE_KEY =
"sb_publishable_kj1HG03vn4ZMqDgC8zWzhA_CRNDty9O";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const ADMIN_PASSWORD = "5676";

const tierRank = {

"LT5":1,
"HT5":2,
"LT4":5,
"HT4":10,
"LT3":12,
"HT3":15,
"LT2":18,
"HT2":20,
"LT1":25,
"HT1":30

};

let currentFilter = "ALL";

let allData = [];

function login(){

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document
.getElementById("adminPanel")
.style.display = "block";

alert("Admin login success");

}else{

alert("Wrong password");

}

}

function filterMode(mode){

currentFilter = mode;

loadPlayers();

}

async function addPlayer(){

const player =
document.getElementById("playerName").value;

const gamemode =
document.getElementById("gamemode").value;

const tier =
document.getElementById("tier").value;

if(player === "") return;

await supabaseClient
.from("players")
.insert([
{
player,
gamemode,
tier
}
]);

document
.getElementById("playerName")
.value = "";

loadPlayers();

}

function getAvatar(name){

return name.charAt(0).toUpperCase();

}

async function loadPlayers(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

const { data,error } =
await supabaseClient
.from("players")
.select("*");

if(error){

console.log(error);

return;

}

allData = data;

const board =
document.getElementById("leaderboard");

board.innerHTML = "";

let grouped = {};

data.forEach(entry=>{

if(
currentFilter !== "ALL" &&
entry.gamemode !== currentFilter
){
return;
}

if(
!entry.player
.toLowerCase()
.includes(search)
){
return;
}

if(!grouped[entry.player]){

grouped[entry.player] = {
points:0
};

}

grouped[entry.player].points +=
tierRank[entry.tier];

});

let sorted =
Object.entries(grouped);

sorted.sort(
(a,b)=>
b[1].points-a[1].points
);

sorted.forEach(([player,info],index)=>{

board.innerHTML += `

<div
class="player"
onclick="openPlayer('${player}')"
>

<div class="left">

<div class="rank">
#${index+1}
</div>

<div class="avatar">
${getAvatar(player)}
</div>

<div class="playerInfo">

<h2>${player}</h2>

<p>Competitive Player</p>

</div>

</div>

<div class="points">

<h3>${info.points}</h3>

<p>Total Points</p>

</div>

</div>

`;

});

}

function openPlayer(player){

document
.getElementById("modal")
.style.display = "flex";

document
.getElementById("modalName")
.innerHTML = player;

document
.getElementById("bigAvatar")
.innerHTML =
getAvatar(player);

const stats =
allData.filter(
x=>x.player===player
);

let total = 0;

let html = "";

stats.forEach(entry=>{

total += tierRank[entry.tier];

html += `

<div class="tierCard">

<div class="tierMode">
${entry.gamemode}
</div>

<div class="tierRank">
${entry.tier}
</div>

<div class="tierPoints">
${tierRank[entry.tier]} pts
</div>

</div>

`;

});

document
.getElementById("totalPoints")
.innerHTML =
total + " Total Points";

document
.getElementById("modalStats")
.innerHTML = html;

}

function closeModal(){

document
.getElementById("modal")
.style.display = "none";

}

loadPlayers();

</script>

</body>
</html>
