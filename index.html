linear-gradient(

);

}

.player:hover::before{

}

.player:hover{

translateY(-6px)

/* MODAL */

.modal{

position:fixed;

inset:0;

rgba(0,0,0,0.72);

}

.modalContent{

border-radius:44px;

linear-gradient(
145deg,

);

1px solid rgba(255,255,255,0.08);

.modalTop{

.bigAvatar{

linear-gradient(

#00ff88,

);

font-size:60px;

color:black;

}

.modalName{

}

.totalPoints{

/* TIER GRID */

.tierGrid{

grid-template-columns:

}

<script>

const SUPABASE_URL =
"https://mgtwbthpqinyxrcnglwt.supabase.co";

const SUPABASE_KEY =
"sb_publishable_kj1HG03vn4ZMqDgC8zWzhA_CRNDty9O";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const ADMIN_PASSWORD = "5676";

const tierRank = {

"LT5":1,
"HT5":2,
"LT4":5,
"HT4":10,
"LT3":12,
"HT3":15,
"LT2":18,
"HT2":20,
"LT1":25,
"HT1":30
};

let currentFilter = "ALL";

let allData = [];

function login(){

const pass =
document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document
.getElementById("adminPanel")
.style.display = "block";

alert("Admin login success");

}else{

alert("Wrong password");
}
}

function filterMode(mode){

currentFilter = mode;

loadPlayers();
}

async function addPlayer(){

const player =
document.getElementById("playerName").value;

const gamemode =
document.getElementById("gamemode").value;

const tier =
document.getElementById("tier").value;

if(player === "") return;

await supabaseClient
.from("players")
.insert([
{
player,
gamemode,
tier
}
]);

document
.getElementById("playerName")
.value = "";

loadPlayers();
}

function getAvatar(name){

return name.charAt(0).toUpperCase();
}

async function loadPlayers(){

const search =
document
.getElementById("searchInput")
.value
.toLowerCase();

const { data,error } =
await supabaseClient
.from("players")
.select("*");

if(error){

console.log(error);

return;
}

allData = data;

const board =
document.getElementById("leaderboard");

board.innerHTML = "";

let grouped = {};

data.forEach(entry=>{

if(
currentFilter !== "ALL" &&
entry.gamemode !== currentFilter
){
return;
}

if(
!entry.player
.toLowerCase()
.includes(search)
){
return;
}

if(!grouped[entry.player]){

grouped[entry.player] = {
points:0
};
}

grouped[entry.player].points +=
tierRank[entry.tier];
});

let sorted =
Object.entries(grouped);

sorted.sort(
(a,b)=>
b[1].points-a[1].points
);

sorted.forEach(([player,info],index)=>{

board.innerHTML += `

<div
class="player"
onclick="openPlayer('${player}')"
>

<div class="left">

<div class="rank">
#${index+1}
</div>

<div class="avatar">
${getAvatar(player)}
</div>

<div class="playerInfo">

<h2>${player}</h2>

<p>Competitive Minecraft Player</p>

</div>

</div>

<div class="points">

<h3>${info.points}</h3>

<p>Total Points</p>

</div>

</div>

`;
});
}

function openPlayer(player){

document
.getElementById("modal")
.style.display = "flex";

document
.getElementById("modalName")
.innerHTML = player;

document
.getElementById("bigAvatar")
.innerHTML =
getAvatar(player);

const stats =
allData.filter(
x=>x.player===player
);

let total = 0;

let html = "";

stats.forEach(entry=>{

total += tierRank[entry.tier];

html += `

<div class="tierCard">

<div class="icon">
${entry.gamemode.split(" ")[0]}
</div>

<div class="mode">
${entry.gamemode}
</div>

<div class="tier">
${entry.tier}
</div>

<div class="pts">
${tierRank[entry.tier]} pts
</div>

</div>

`;
});

document
.getElementById("totalPoints")
.innerHTML =
total + " Total Points";

document
.getElementById("modalStats")
.innerHTML = html;
}

function closeModal(){

document
.getElementById("modal")
.style.display = "none";
}

loadPlayers();

</script>

</body>
</html>
