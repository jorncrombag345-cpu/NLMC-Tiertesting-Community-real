<body>

<div class="container">

<h1>NL Tier Testing</h1>

<div class="adminBox">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Admin wachtwoord">

<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none;">

<h2>Speler toevoegen</h2>

<input type="text" id="playerName" placeholder="Spelernaam">

<select id="gamemode">

<option>Spear</option>

<option>Axe</option>
<option>Vanilla</option>
<option>DIA SMP</option>

</select>

<select id="tier">

<option>HT1</option>
<option>LT1</option>
<option>HT2</option>
<option>LT2</option>
<option>HT3</option>
<option>LT3</option>
<option>HT4</option>
<option>LT4</option>
<option>HT5</option>
<option>LT5</option>

</select>

<button onclick="addPlayer()">Opslaan</button>

</div>

</div>

<div class="searchBox">

<h2>Zoek speler</h2>

<input type="text" id="searchInput" placeholder="Zoek speler..." onkeyup="loadPlayers()">

</div>

<h2>Gamemode Filter</h2>

<div class="filterButtons">

<button onclick="filterMode('ALL')">All</button>
<button onclick="filterMode('Spear')">Spear</button>
<button onclick="filterMode('Mace')">Mace</button>
<button onclick="filterMode('Sword')">Sword</button>
<button onclick="filterMode('UHC')">UHC</button>
<button onclick="filterMode('Speed')">Speed</button>
<button onclick="filterMode('Axe')">Axe</button>
<button onclick="filterMode('Vanilla')">Vanilla</button>
<button onclick="filterMode('DIA SMP')">DIA SMP</button>
<button onclick="filterMode('Cart')">Cart</button>
<button onclick="filterMode('Creeper')">Creeper</button>

</div>

<h2>Leaderboard</h2>

<div id="leaderboard"></div>

</div>

<script>

const SUPABASE_URL = "https://mgtwbthpqinyxrcnglwt.supabase.co";

const SUPABASE_KEY = "sb_publishable_kj1HG03vn4ZMqDgC8zWzhA_CRNDty9O";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const ADMIN_PASSWORD = "5676";

const tierRank = {

    "LT5":1,
    "HT5":2,
    "LT4":5,
    "HT4":10,
    "LT3":12,
    "HT3":15,
    "LT2":18,
    "HT2":20,
    "LT1":25,
    "HT1":30

};

let currentFilter = "ALL";

let isAdmin = false;

function login(){

    const pass = document.getElementById("password").value;

    if(pass === ADMIN_PASSWORD){

        isAdmin = true;

        document.getElementById("adminPanel").style.display = "block";

        alert("Ingelogd!");

        loadPlayers();

    }else{

        alert("Verkeerd wachtwoord");

    }
}

function filterMode(mode){

    currentFilter = mode;

    loadPlayers();
}

async function addPlayer(){

    const player = document.getElementById("playerName").value;

    const gamemode = document.getElementById("gamemode").value;

    const tier = document.getElementById("tier").value;

    if(player === "") return;

    await supabaseClient
    .from("players")
    .insert([
        {
            player: player,
            gamemode: gamemode,
            tier: tier
        }
    ]);

    document.getElementById("playerName").value = "";

    loadPlayers();
}

async function deleteTier(id){

    await supabaseClient
    .from("players")
    .delete()
    .eq("id", id);

    loadPlayers();
}

async function loadPlayers(){

    const { data, error } = await supabaseClient
    .from("players")
    .select("*");

    if(error){

        console.log(error);

        return;
    }

    const board = document.getElementById("leaderboard");

    board.innerHTML = "";

    let search = document.getElementById("searchInput").value.toLowerCase();

    let groupedPlayers = {};

    data.forEach(entry => {

        if(currentFilter !== "ALL" && entry.gamemode !== currentFilter){
            return;
        }

        if(!entry.player.toLowerCase().includes(search)){
            return;
        }

        if(!groupedPlayers[entry.player]){

            groupedPlayers[entry.player] = {
                total:0,
                modes:[]
            };
        }

        groupedPlayers[entry.player].total += tierRank[entry.tier];

        groupedPlayers[entry.player].modes.push(
            `
            <div class="mode">

                ${entry.gamemode} • ${entry.tier} • ${tierRank[entry.tier]} punten

                ${
                    isAdmin
                    ?
                    `<button class="deleteBtn" onclick="deleteTier(${entry.id})">❌</button>`
                    :
                    ""
                }

            </div>
            `
        );

    });

    let sortedPlayers = Object.entries(groupedPlayers);

    sortedPlayers.sort((a,b) => b[1].total - a[1].total);

    sortedPlayers.forEach(([player, info]) => {

        board.innerHTML += `

            <div class="player">

                <div class="rank">
                    ${player}
                </div>

                <div class="total">
                    ⭐ ${info.total} punten totaal
                </div>

                <div>
                    ${info.modes.join("")}
                </div>

            </div>

        `;
    });
}

loadPlayers();

</script>

</body>
</html>
