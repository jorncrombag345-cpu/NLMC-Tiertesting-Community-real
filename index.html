<body>

<div class="container">

<h1>NL Tier Testing</h1>

<div class="adminBox">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Admin wachtwoord">

<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none;">

<h2>Speler toevoegen</h2>

<input type="text" id="playerName" placeholder="Spelernaam">

<select id="gamemode">

<option>Spear</option>
<option>Mace</option>
<option>Sword</option>
<option>UHC</option>
<option>Speed</option>
<option>Axe</option>
<option>Vanilla</option>

</select>

<select id="tier">

<option>HT1</option>
<option>LT1</option>
<option>HT2</option>
<option>LT2</option>
<option>HT3</option>
<option>LT3</option>
<option>HT4</option>
<option>LT4</option>
<option>HT5</option>
<option>LT5</option>

</select>

<button onclick="addPlayer()">Opslaan</button>

</div>

</div>

<h2>Gamemode Filter</h2>

<div class="filterButtons">

<button onclick="filterMode('ALL')">All</button>

<button onclick="filterMode('Spear')">Spear</button>

<button onclick="filterMode('Mace')">Mace</button>

<button onclick="filterMode('Sword')">Sword</button>

<button onclick="filterMode('UHC')">UHC</button>

<button onclick="filterMode('Speed')">Speed</button>

<button onclick="filterMode('Axe')">Axe</button>

<button onclick="filterMode('Vanilla')">Vanilla</button>

</div>

<h2>Leaderboard</h2>

<div id="leaderboard"></div>

</div>

<script>

const SUPABASE_URL = "https://mgtwbthpqinyxrcnglwt.supabase.co";

const SUPABASE_KEY = "sb_publishable_kj1HG03vn4ZMqDgC8zWzhA_CRNDty9O";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const ADMIN_PASSWORD = "1234";

const tierRank = {

    "HT1":1,
    "LT1":2,
    "HT2":3,
    "LT2":4,
    "HT3":5,
    "LT3":6,
    "HT4":7,
    "LT4":8,
    "HT5":9,
    "LT5":10

};

let currentFilter = "ALL";

let isAdmin = false;

function login(){

    const pass = document.getElementById("password").value;

    if(pass === ADMIN_PASSWORD){

        isAdmin = true;

        document.getElementById("adminPanel").style.display = "block";

        alert("Ingelogd!");

        loadPlayers();

    }else{

        alert("Verkeerd wachtwoord");

    }
}

function filterMode(mode){

    currentFilter = mode;

    loadPlayers();
}

async function addPlayer(){

    const player = document.getElementById("playerName").value;

    const gamemode = document.getElementById("gamemode").value;

    const tier = document.getElementById("tier").value;

    if(player === "") return;

    await supabaseClient
    .from("players")
    .insert([
        {
            player: player,
            gamemode: gamemode,
            tier: tier
        }
    ]);

    document.getElementById("playerName").value = "";

    loadPlayers();
}

async function deletePlayer(id){

    await supabaseClient
    .from("players")
    .delete()
    .eq("id", id);

    loadPlayers();
}

async function loadPlayers(){

    const { data, error } = await supabaseClient
    .from("players")
    .select("*");

    if(error){

        console.log(error);

        return;
    }

    const board = document.getElementById("leaderboard");

    board.innerHTML = "";

    data.sort((a,b) => tierRank[a.tier] - tierRank[b.tier]);

    data.forEach(entry => {

        if(currentFilter !== "ALL" && entry.gamemode !== currentFilter){
            return;
        }

        board.innerHTML += `

            <div class="player">

                <div class="rank">
                    ${entry.player}
                </div>

                <div>
                    ${entry.gamemode} • ${entry.tier}
                </div>

                ${
                    isAdmin
                    ?
                    `<button class="deleteBtn" onclick="deletePlayer(${entry.id})">Delete</button>`
                    :
                    ""
                }

            </div>

        `;
    });
}

loadPlayers();

</script>

</body>
</html>
