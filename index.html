<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL Tier Testing</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

input, select, button{
    padding:10px;
    margin:5px;
}

.player{
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>NL Tier Testing</h1>

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Admin wachtwoord">
<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none;">

<h2>Tier toevoegen</h2>

<input type="text" id="playerName" placeholder="Spelernaam">

<select id="gamemode">
<option>Spear</option>
<option>Mace</option>
<option>Sword</option>
<option>UHC</option>
<option>Speed</option>
<option>Axe</option>
<option>Vanilla</option>
</select>

<select id="tier">
<option>LT5</option>
<option>HT5</option>
<option>LT4</option>
<option>HT4</option>
<option>LT3</option>
<option>HT3</option>
<option>LT2</option>
<option>HT2</option>
<option>LT1</option>
<option>HT1</option>
</select>

<button onclick="addPlayer()">Opslaan</button>

</div>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

</div>

<script>

const ADMIN_PASSWORD = "1234"; // verander dit

function login(){
    const pass = document.getElementById("password").value;

    if(pass === ADMIN_PASSWORD){
        document.getElementById("adminPanel").style.display = "block";
        alert("Ingelogd!");
    } else {
        alert("Verkeerd wachtwoord");
    }
}

function addPlayer(){

    const player = document.getElementById("playerName").value;
    const gamemode = document.getElementById("gamemode").value;
    const tier = document.getElementById("tier").value;

    if(player === "") return;

    let data = JSON.parse(localStorage.getItem("tiers") || "[]");

    data.push({
        player,
        gamemode,
        tier
    });

    localStorage.setItem("tiers", JSON.stringify(data));

    renderLeaderboard();
}

function renderLeaderboard(){

    const board = document.getElementById("leaderboard");

    let data = JSON.parse(localStorage.getItem("tiers") || "[]");

    board.innerHTML = "";

    data.forEach(entry => {

        board.innerHTML += `
            <div class="player">
                <b>${entry.player}</b><br>
                ${entry.gamemode} - ${entry.tier}
            </div>
        `;
    });
}

renderLeaderboard();

</script>

</body>
</html>
